# Mosquitto 2.x configuration for local development
#
# CRITICAL: Both lines below are REQUIRED for Mosquitto 2.x.
# Without them, the container starts healthy but silently rejects all connections.
# The default in Mosquitto 2.x changed from open to closed (breaking change from 1.x).
#
# Production/staging: replace allow_anonymous with password_file directive
# and remove the host port binding in docker-compose.yml.

listener 1883
allow_anonymous true
